<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Snake</title>
    <!-- Estilos do jogo -->
    <link rel="stylesheet" href="style.css">

    <!-- Brython Core e Stdlib -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython_stdlib.js"></script>

    <!-- Fonte moderna do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body onload="brython()">
    <div class="game-wrapper">
        <h1>Antigravity Snake</h1>
        <div id="score">Pontuação: 0 | Recorde: 0</div>
        <div id="game-container"></div>
        <button id="start-btn">INICIAR JOGO</button>

        <button id="restart-btn" style="display:none;" onclick="location.reload()">Jogar Novamente</button>

        <div class="controls-hint">
            Use as <strong>Setas Direcionais</strong> (ou WASD) para jogar.
        </div>
    </div>

    <!-- Lógica do Jogo em Python -->
    <script type="text/python">
        from browser import document, timer
        from antigravity import Canvas
        import random

        # Configurações do jogo
        CANVAS_SIZE = 400
        GRID_SIZE = 20
        FPS = 12
        
        # Inicializa o Canvas
        canvas = Canvas(width=CANVAS_SIZE, height=CANVAS_SIZE, parent=document['game-container'])
        
        # Carrega High Score
        high_score = int(document.localStorage.getItem('snake-high-score') or 0)
        
        def update_score_display():
            document["score"].text = f"Pontuação: {score} | Recorde: {high_score}"

        # Estado inicial
        snake = [(200, 200), (180, 200), (160, 200)]
        direction = (GRID_SIZE, 0)
        next_direction = direction
        score = 0
        game_over = False
        running = False # Jogo começa parado

        def spawn_food():
            while True:
                x = random.randint(0, (canvas.width - GRID_SIZE) // GRID_SIZE) * GRID_SIZE
                y = random.randint(0, (canvas.height - GRID_SIZE) // GRID_SIZE) * GRID_SIZE
                if (x, y) not in snake:
                    return x, y

        food = spawn_food()

        def draw():
            # Fundo opaco para não ter "espaço vazio" transparente
            canvas.ctx.fillStyle = "#1e1e2f"
            canvas.ctx.fillRect(0, 0, canvas.width, canvas.height)
            
            # Grade sutil (opcional, ajuda a alinhar visualmente)
            canvas.ctx.strokeStyle = "rgba(255, 255, 255, 0.05)"
            for x in range(0, canvas.width, GRID_SIZE):
                canvas.ctx.beginPath()
                canvas.ctx.moveTo(x, 0)
                canvas.ctx.lineTo(x, canvas.height)
                canvas.ctx.stroke()
            for y in range(0, canvas.height, GRID_SIZE):
                canvas.ctx.beginPath()
                canvas.ctx.moveTo(0, y)
                canvas.ctx.lineTo(canvas.width, y)
                canvas.ctx.stroke()
            
            # Desenha a comida com um vermelho vibrante
            canvas.ctx.shadowBlur = 10
            canvas.ctx.shadowColor = "#ff4757"
            canvas.rectangle(food[0], food[1], GRID_SIZE, GRID_SIZE, fill="#ff4757")
            canvas.ctx.shadowBlur = 0 # Reseta o blur
            
            # Desenha a cobra
            for i, segment in enumerate(snake):
                if i == 0:
                    color = "#00f2fe" # Cabeça (Ciano)
                else:
                    color = "#4facfe" # Corpo (Azul Claro)
                
                # Efeito de neon para a cabeça
                if i == 0:
                    canvas.ctx.shadowBlur = 8
                    canvas.ctx.shadowColor = "#00f2fe"
                else:
                    canvas.ctx.shadowBlur = 0

                canvas.rectangle(segment[0], segment[1], GRID_SIZE, GRID_SIZE, fill=color)
            
            canvas.ctx.shadowBlur = 0
            
            # Tela de Game Over
            if game_over:
                canvas.ctx.fillStyle = "rgba(0, 0, 0, 0.7)"
                canvas.ctx.fillRect(0, 0, canvas.width, canvas.height)
                canvas.text(canvas.width // 2, canvas.height // 2, "GAME OVER", fill="#ff4757", font="bold 40px Inter", align="center")

        def update():
            global game_over, score, food, direction
            if game_over:
                return

            direction = next_direction

            head_x, head_y = snake[0]
            dx, dy = direction
            new_head = (head_x + dx, head_y + dy)

            # Detecta colisão com as paredes
            if new_head[0] < 0 or new_head[0] >= canvas.width or new_head[1] < 0 or new_head[1] >= canvas.height:
                game_over = True
            
            # Detecta colisão com o próprio corpo (exceto a pontinha da cauda que vai sair)
            if new_head in snake[:-1]:
                game_over = True
            
            if game_over:
                if score > high_score:
                    document.localStorage.setItem('snake-high-score', score)
                document["start-btn"].style.display = "block"
                document["start-btn"].text = "TENTAR NOVAMENTE"
                draw()
                return

            snake.insert(0, new_head)

            # Verifica se comeu a comida
            if new_head == food:
                score += 10
                if score > high_score:
                    global high_score
                    high_score = score
                update_score_display()
                food = spawn_food()
            else:
                snake.pop()

            draw()

        def keydown(ev):
            global next_direction
            # Impede a página de "rolar" ao usar as setas
            if ev.key in ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"]:
                ev.preventDefault()
                
            if ev.key in ["ArrowUp", "w", "W"] and direction != (0, GRID_SIZE):
                next_direction = (0, -GRID_SIZE)
            elif ev.key in ["ArrowDown", "s", "S"] and direction != (0, -GRID_SIZE):
                next_direction = (0, GRID_SIZE)
            elif ev.key in ["ArrowLeft", "a", "A"] and direction != (GRID_SIZE, 0):
                next_direction = (-GRID_SIZE, 0)
            elif ev.key in ["ArrowRight", "d", "D"] and direction != (-GRID_SIZE, 0):
                next_direction = (GRID_SIZE, 0)

        document.bind("keydown", keydown)

        # Listener para o botão de Iniciar
        def start_game(ev):
            nonlocal running, game_over, score, snake, direction, next_direction, food
            if not running:
                if game_over:
                    # Reset state
                    snake = [(200, 200), (180, 200), (160, 200)]
                    direction = (GRID_SIZE, 0)
                    next_direction = direction
                    score = 0
                    game_over = False
                    food = spawn_food()
                    update_score_display()
                
                running = True
                document["start-btn"].style.display = "none"
                loop()

        document["start-btn"].bind("click", start_game)
        update_score_display()

        def loop():
            if game_over:
                nonlocal running
                running = False
                return
            
            update()
            if running:
                timer.set_timeout(loop, 1000 // FPS)

        # Desenha tela inicial
        draw()
    </script>
</body>

</html>
